version: 1

run:
  project_root: .
  state_dir: .codex-loop-state
  max_steps: 50

executor:
  cmd: ["codex", "exec", "--skip-git-repo-check"]

context:
  defaults:
    spec: "docs/prefect-codex-implement-loop-plan.md"
    user_instruction: "请按规格完成。"

workflow:
  start: implement_first
  nodes:
    - id: implement_first
      prompt: |
        {{ prompt_file("./prompts/shared/implementer_role.md") }}

        用户首轮指令: {{ inputs.user_instruction }}
        任务: {{ inputs.spec }}

        最后一行输出严格 JSON object（不要使用代码块），至少包含：
        {
          "pass": true/false,
          "change_summary": "..."
        }

      input_map:
        user_instruction: context.defaults.user_instruction
        spec: context.defaults.spec
      on_success: check
      on_failure: END
      route_bindings:
        success:
          context.runtime.latest_impl: outputs.implement_first

    - id: check
      prompt: |
        {{ prompt_file("./prompts/shared/implementer_checker_role.md") }}

        任务: {{ inputs.spec }}
        实现输出: {{ inputs.latest_impl }}

        若全部完成，pass=true 且 todo 为空数组。
        若未完成，pass=false 且 todo 给出剩余待办（字符串数组）。
        最后一行输出严格 JSON object（不要使用代码块），至少包含：
        {
          "pass": true/false,
          "verification": "...",
          "todo": ["..."]
        }
      input_map:
        spec: context.defaults.spec
        latest_impl: context.runtime.latest_impl
      on_success: END
      on_failure: implement_loop
      route_bindings:
        failure:
          context.runtime.latest_check: outputs.check

    - id: implement_loop
      prompt: |
        {{ prompt_file("./prompts/shared/implementer_role.md") }}
        最后一行输出严格 JSON object（不要使用代码块），至少包含：
        {
          "pass": true/false,
          "change_summary": "...",
          "addressed_todo": ["..."]
        }
        输入规格: {{ inputs.spec }}
        检查待办: {{ inputs.latest_check }}
        请根据待办修复问题并更新实现。
      input_map:
        spec: context.defaults.spec
        latest_check: context.runtime.latest_check
      on_success: check
      on_failure: END
      route_bindings:
        success:
          context.runtime.latest_impl: outputs.implement_loop

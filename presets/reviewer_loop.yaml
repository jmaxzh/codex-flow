version: 1

run:
  project_root: .
  state_dir: .codex-loop-state
  max_steps: 50

executor:
  cmd: ["codex", "exec", "--skip-git-repo-check"]

context:
  defaults:
    user_instruction: "请 review 未提交代码，直到没有新增问题。"

workflow:
  start: bug_reviwer
  nodes:
    - id: bug_reviwer
      prompt: |
        用户指令: {{ inputs.user_instruction }}
        历史评审输出: {{ inputs.bug_review_history }}

        {{ prompt_file("./prompts/shared/bug_reviwer_role.md") }}

        仅输出“本轮新增问题（含代码位置）”，不要重复历史中已发现的问题。
        若无新增问题，pass=true，否则 pass=false，
        最后一行输出严格 JSON object（不要使用代码块）：
        {"pass": true/false}
      input_map:
        user_instruction: context.defaults.user_instruction
        bug_review_history: context.runtime.bug_review_history

      collect_history_to: context.runtime.bug_review_history
      on_success: END
      on_failure: bug_reviwer

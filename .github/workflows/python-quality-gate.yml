name: Python Quality Gate

on: [push]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install quality tooling from pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pre-commit stage gate
        run: pre-commit run --all-files --hook-stage pre-commit

      - name: Run pre-push stage gate
        run: pre-commit run --all-files --hook-stage pre-push

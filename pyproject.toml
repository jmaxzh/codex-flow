[tool.ruff]
target-version = "py313"
line-length = 130
src = ["scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
per-file-ignores = { "tests/test_codex_orchestrator.py" = ["E402"] }

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.basedpyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]
exclude = ["**/__pycache__"]
